<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sihtak Careers — Admin Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/icon.png">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Login overlay */
        .login-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            text-align: center; padding: 40px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg);
            width: 340px; max-width: 90vw;
        }
        .login-box img { width: 48px; height: 48px; border-radius: 12px; margin-bottom: 16px; }
        .login-box h2 { font-size: 18px; margin: 0 0 4px; color: var(--text); }
        .login-box p { font-size: 13px; color: var(--text-m); margin: 0 0 24px; }
        .login-box input {
            width: 100%; padding: 12px 16px; background: var(--bg-subtle); border: 1px solid var(--border);
            border-radius: var(--r-sm); color: var(--text); font-size: 16px; text-align: center;
            letter-spacing: 8px; outline: none; transition: border-color 0.2s;
        }
        .login-box input:focus { border-color: var(--teal); }
        .login-box .login-btn {
            width: 100%; margin-top: 16px; padding: 12px;
            background: linear-gradient(135deg, #0d9488, #0f766e); color: #fff;
            border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .login-box .login-btn:hover { transform: translateY(-1px); }
        .login-error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }

        .admin-nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(3,3,3,0.92); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .admin-nav-left { display: flex; align-items: center; gap: 12px; }
        .admin-nav-left img { width: 32px; height: 32px; border-radius: 8px; }
        .admin-nav-left h1 { font-size: 16px; font-weight: 600; color: var(--text); margin: 0; }
        .admin-nav-left span { font-size: 12px; color: var(--text-m); background: var(--bg-card); border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; }
        .admin-nav-right { display: flex; align-items: center; gap: 10px; }

        .admin-container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* Stats cards */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
            padding: 16px 20px; text-align: center;
        }
        .stat-card .stat-num { font-size: 28px; font-weight: 700; color: var(--teal); }
        .stat-card .stat-label { font-size: 12px; color: var(--text-m); margin-top: 4px; }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .search-input {
            flex: 1; min-width: 200px; padding: 10px 16px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-sm);
            color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--teal); }
        .search-input::placeholder { color: var(--text-m); }

        .filter-select {
            padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--r-sm); color: var(--text); font-size: 14px; outline: none; cursor: pointer;
        }
        .filter-select:focus { border-color: var(--teal); }

        .btn-export {
            padding: 10px 20px; background: linear-gradient(135deg, #0d9488, #0f766e);
            color: #fff; border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .btn-export:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(13,148,136,0.3); }

        .btn-refresh {
            padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--r-sm); color: var(--text); font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .btn-refresh:hover { border-color: var(--teal); }

        /* Table */
        .table-wrap {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: rgba(255,255,255,0.03); }
        th {
            padding: 12px 14px; text-align: left; font-weight: 600; color: var(--text-m);
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none;
        }
        th:hover { color: var(--teal); }
        th .sort-icon { font-size: 10px; margin-left: 4px; opacity: 0.4; }
        th.sorted .sort-icon { opacity: 1; color: var(--teal); }
        td {
            padding: 10px 14px; border-bottom: 1px solid var(--border);
            color: var(--text); vertical-align: middle;
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        tr.expanded td { background: rgba(13,148,136,0.05); }

        /* Status badges */
        .status-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            text-transform: capitalize;
        }
        .status-badge:hover { transform: scale(1.05); }
        .status-new { background: rgba(156,163,175,0.2); color: #9ca3af; }
        .status-reviewed { background: rgba(96,165,250,0.2); color: #60a5fa; }
        .status-shortlisted { background: rgba(13,148,136,0.2); color: #0d9488; }
        .status-rejected { background: rgba(239,68,68,0.2); color: #ef4444; }
        .status-hired { background: rgba(34,197,94,0.2); color: #22c55e; }

        /* Commute badge */
        .commute-yes { color: #0d9488; font-weight: 600; }
        .commute-no { color: #ef4444; font-weight: 600; }

        /* Expanded detail row */
        .detail-row td { padding: 0; border-bottom: 1px solid var(--border); }
        .detail-content {
            padding: 16px 20px; background: rgba(255,255,255,0.01);
            border-top: 1px dashed var(--border);
        }
        .detail-content h4 { margin: 0 0 8px; font-size: 13px; color: var(--teal); }
        .detail-content p { margin: 0 0 12px; color: var(--text); font-size: 13px; white-space: pre-wrap; line-height: 1.6; }
        .detail-attachments { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .detail-attachments a {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--teal); text-decoration: none; font-size: 12px;
            transition: all 0.2s;
        }
        .detail-attachments a:hover { border-color: var(--teal); background: rgba(13,148,136,0.1); }

        /* Notes input */
        .notes-area {
            width: 100%; padding: 8px 12px; margin-top: 8px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 13px; resize: vertical; min-height: 60px; outline: none;
        }
        .notes-area:focus { border-color: var(--teal); }
        .btn-save-notes {
            margin-top: 8px; padding: 6px 14px;
            background: var(--teal); color: #000; border: none; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer;
        }

        /* Status menu */
        .status-menu {
            position: absolute; z-index: 50;
            background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px;
            padding: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .status-menu button {
            display: block; width: 100%; padding: 8px 16px; text-align: left;
            background: none; border: none; color: var(--text); font-size: 13px;
            cursor: pointer; border-radius: 6px; white-space: nowrap;
        }
        .status-menu button:hover { background: rgba(255,255,255,0.05); }

        /* Loading */
        .loading { text-align: center; padding: 60px 20px; color: var(--text-m); }
        .loading .spinner {
            width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--teal);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty { text-align: center; padding: 60px 20px; color: var(--text-m); font-size: 14px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 200;
            padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
            transform: translateY(100px); opacity: 0; transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { background: #0d9488; color: #fff; }
        .toast-error { background: #ef4444; color: #fff; }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-container { padding: 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; }
            .search-input { min-width: 100%; }
            th, td { padding: 8px 10px; font-size: 12px; }
        }

        /* Light mode */
        html[data-theme="light"] .admin-nav { background: rgba(255,255,255,0.92); }
        html[data-theme="light"] .status-menu { background: #fff; border-color: #e5e7eb; }
        html[data-theme="light"] .notes-area { background: #f9fafb; border-color: #e5e7eb; }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <img src="/icon.png" alt="Sihtak">
            <h2>Careers Admin</h2>
            <p>Enter access code to continue</p>
            <input type="password" id="passInput" placeholder="****" maxlength="10" autocomplete="off" onkeydown="if(event.key==='Enter')checkPass()">
            <button class="login-btn" onclick="checkPass()">Unlock</button>
            <div class="login-error" id="loginError">Incorrect code. Try again.</div>
        </div>
    </div>

    <!-- Nav -->
    <nav class="admin-nav" style="display:none;" id="adminNav">
        <div class="admin-nav-left">
            <img src="/icon.png" alt="Sihtak">
            <h1>Sihtak Careers</h1>
            <span>Admin</span>
        </div>
        <div class="admin-nav-right">
            <button class="btn-refresh" onclick="loadApplications()" title="Refresh">&#x21bb; Refresh</button>
            <button class="btn-refresh" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">&#x263E;</button>
        </div>
    </nav>

    <div class="admin-container" style="display:none;" id="adminContainer">
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Total Applications</div></div>
            <div class="stat-card"><div class="stat-num" id="statNew">-</div><div class="stat-label">New</div></div>
            <div class="stat-card"><div class="stat-num" id="statShortlisted">-</div><div class="stat-label">Shortlisted</div></div>
            <div class="stat-card"><div class="stat-num" id="statHired">-</div><div class="stat-label">Hired</div></div>
            <div class="stat-card"><div class="stat-num" id="statRejected">-</div><div class="stat-label">Rejected</div></div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email, area, instagram..." oninput="filterTable()">
            <select class="filter-select" id="statusFilter" onchange="filterTable()">
                <option value="">All Statuses</option>
                <option value="new">New</option>
                <option value="reviewed">Reviewed</option>
                <option value="shortlisted">Shortlisted</option>
                <option value="rejected">Rejected</option>
                <option value="hired">Hired</option>
            </select>
            <button class="btn-export" onclick="exportExcel()">&#x1F4E5; Export Excel</button>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                Loading applications...
            </div>
            <div class="empty" id="emptyState" style="display:none;">No applications found.</div>
            <table id="appTable" style="display:none;">
                <thead>
                    <tr>
                        <th onclick="sortBy('idx')"># <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('full_name')">Name <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('whatsapp')">WhatsApp <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('email')">Email <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('area')">Area <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('instagram')">Instagram <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('expected_salary')">Salary (SYP) <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('can_commute')">Commute <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('status')">Status <span class="sort-icon">&#x25B2;</span></th>
                        <th onclick="sortBy('created_at')">Date <span class="sort-icon">&#x25B2;</span></th>
                        <th>Files</th>
                    </tr>
                </thead>
                <tbody id="appBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Status menu (hidden, positioned on click) -->
    <div class="status-menu" id="statusMenu" style="display:none;">
        <button onclick="setStatus('new')">&#x26AA; New</button>
        <button onclick="setStatus('reviewed')">&#x1F535; Reviewed</button>
        <button onclick="setStatus('shortlisted')">&#x1F7E2; Shortlisted</button>
        <button onclick="setStatus('rejected')">&#x1F534; Rejected</button>
        <button onclick="setStatus('hired')">&#x2705; Hired</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const API = 'https://fahsak-api.azurewebsites.net/api/v1/careers';
        let allApps = [];
        let filteredApps = [];
        let expandedId = null;
        let sortField = 'created_at';
        let sortAsc = false;
        let statusMenuAppId = null;

        // Theme
        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('admin-theme', t);
            document.getElementById('themeBtn').innerHTML = t === 'light' ? '&#x2600;' : '&#x263E;';
        }
        (function() {
            const saved = localStorage.getItem('admin-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
                if (saved === 'light') document.getElementById('themeBtn').innerHTML = '&#x2600;';
            }
        })();

        // Load data
        async function loadApplications() {
            document.getElementById('loadingState').style.display = '';
            document.getElementById('appTable').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';

            try {
                const res = await fetch(API + '/applications');
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();
                allApps = data.applications || [];
                updateStats();
                filterTable();
            } catch (e) {
                document.getElementById('loadingState').innerHTML = '<p style="color:#ef4444;">Failed to load applications. Check your connection.</p>';
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allApps.length;
            document.getElementById('statNew').textContent = allApps.filter(a => a.status === 'new').length;
            document.getElementById('statShortlisted').textContent = allApps.filter(a => a.status === 'shortlisted').length;
            document.getElementById('statHired').textContent = allApps.filter(a => a.status === 'hired').length;
            document.getElementById('statRejected').textContent = allApps.filter(a => a.status === 'rejected').length;
        }

        // Filter + Search
        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const statusF = document.getElementById('statusFilter').value;

            filteredApps = allApps.filter(a => {
                if (statusF && a.status !== statusF) return false;
                if (q) {
                    const haystack = [a.full_name, a.email, a.area, a.instagram, a.whatsapp, a.expected_salary, a.motivation].join(' ').toLowerCase();
                    return haystack.includes(q);
                }
                return true;
            });

            doSort();
            renderTable();
        }

        // Sort
        function sortBy(field) {
            if (sortField === field) {
                sortAsc = !sortAsc;
            } else {
                sortField = field;
                sortAsc = true;
            }
            doSort();
            renderTable();
        }

        function doSort() {
            filteredApps.sort((a, b) => {
                let va, vb;
                if (sortField === 'idx') {
                    va = allApps.indexOf(a);
                    vb = allApps.indexOf(b);
                } else if (sortField === 'created_at') {
                    va = a.created_at || '';
                    vb = b.created_at || '';
                } else if (sortField === 'expected_salary') {
                    va = parseInt((a.expected_salary || '0').replace(/[^\d]/g, '')) || 0;
                    vb = parseInt((b.expected_salary || '0').replace(/[^\d]/g, '')) || 0;
                } else {
                    va = (a[sortField] || '').toLowerCase();
                    vb = (b[sortField] || '').toLowerCase();
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        // Render
        function renderTable() {
            const loading = document.getElementById('loadingState');
            const table = document.getElementById('appTable');
            const empty = document.getElementById('emptyState');
            const body = document.getElementById('appBody');

            loading.style.display = 'none';

            if (filteredApps.length === 0) {
                table.style.display = 'none';
                empty.style.display = '';
                return;
            }

            table.style.display = '';
            empty.style.display = 'none';

            body.innerHTML = filteredApps.map((a, i) => {
                const idx = allApps.indexOf(a) + 1;
                const date = a.created_at ? new Date(a.created_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';
                const time = a.created_at ? new Date(a.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '';
                const files = (a.attachments || []).length;
                const isExpanded = expandedId === a.id;
                const commute = a.can_commute === 'yes'
                    ? '<span class="commute-yes">Yes</span>'
                    : a.can_commute === 'no' ? '<span class="commute-no">No</span>' : (a.can_commute || '-');

                let html = `<tr class="${isExpanded ? 'expanded' : ''}" onclick="toggleRow('${a.id}')" style="cursor:pointer;">
                    <td>${idx}</td>
                    <td><strong>${esc(a.full_name)}</strong></td>
                    <td>${esc(a.whatsapp || '-')}</td>
                    <td><a href="mailto:${esc(a.email)}" onclick="event.stopPropagation()" style="color:var(--teal);text-decoration:none;">${esc(a.email || '-')}</a></td>
                    <td>${esc(a.area)}</td>
                    <td>${esc(a.instagram)}</td>
                    <td>${esc(a.expected_salary)}</td>
                    <td>${commute}</td>
                    <td><span class="status-badge status-${a.status}" onclick="event.stopPropagation(); showStatusMenu(event, '${a.id}')">${a.status}</span></td>
                    <td><span title="${time}">${date}</span></td>
                    <td>${files > 0 ? '<span style="color:var(--teal);font-weight:600;">' + files + '</span>' : '0'}</td>
                </tr>`;

                if (isExpanded) {
                    const attHtml = (a.attachments || []).map(f =>
                        `<a href="${esc(f.url)}" target="_blank" onclick="event.stopPropagation()">&#x1F4CE; ${esc(f.filename)} <span style="color:var(--text-m);">(${Math.round(f.size/1024)} KB)</span></a>`
                    ).join('') || '<span style="color:var(--text-m);">No files attached</span>';

                    html += `<tr class="detail-row" onclick="event.stopPropagation()">
                        <td colspan="11">
                            <div class="detail-content">
                                <h4>Motivation</h4>
                                <p>${esc(a.motivation || '-')}</p>
                                <h4>Attachments (${(a.attachments||[]).length})</h4>
                                <div class="detail-attachments">${attHtml}</div>
                                <h4 style="margin-top:16px;">Notes</h4>
                                <textarea class="notes-area" id="notes-${a.id}" onclick="event.stopPropagation()" placeholder="Add notes about this applicant...">${esc(a.notes || '')}</textarea>
                                <button class="btn-save-notes" onclick="event.stopPropagation(); saveNotes('${a.id}')">Save Notes</button>
                            </div>
                        </td>
                    </tr>`;
                }

                return html;
            }).join('');
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Expand/Collapse rows
        function toggleRow(id) {
            expandedId = expandedId === id ? null : id;
            renderTable();
        }

        // Status menu
        function showStatusMenu(e, appId) {
            e.stopPropagation();
            statusMenuAppId = appId;
            const menu = document.getElementById('statusMenu');
            menu.style.display = 'block';
            menu.style.top = e.clientY + 'px';
            menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
        }

        async function setStatus(status) {
            document.getElementById('statusMenu').style.display = 'none';
            if (!statusMenuAppId) return;

            try {
                const res = await fetch(API + '/applications/' + statusMenuAppId + '?status=' + status, { method: 'PATCH' });
                if (!res.ok) throw new Error('Failed');
                const app = allApps.find(a => a.id === statusMenuAppId);
                if (app) app.status = status;
                updateStats();
                renderTable();
                showToast('Status updated to ' + status, 'success');
            } catch (e) {
                showToast('Failed to update status', 'error');
            }
        }

        // Notes
        async function saveNotes(appId) {
            const notes = document.getElementById('notes-' + appId).value;
            try {
                const res = await fetch(API + '/applications/' + appId + '?notes=' + encodeURIComponent(notes), { method: 'PATCH' });
                if (!res.ok) throw new Error('Failed');
                const app = allApps.find(a => a.id === appId);
                if (app) app.notes = notes;
                showToast('Notes saved', 'success');
            } catch (e) {
                showToast('Failed to save notes', 'error');
            }
        }

        // Excel Export
        function exportExcel() {
            if (allApps.length === 0) { showToast('No applications to export', 'error'); return; }

            const rows = allApps.map((a, i) => ({
                '#': i + 1,
                'Full Name': a.full_name,
                'WhatsApp': a.whatsapp || '',
                'Email': a.email || '',
                'Area': a.area,
                'Instagram': a.instagram,
                'Expected Salary (SYP)': a.expected_salary,
                'Can Commute': a.can_commute || '',
                'Motivation': a.motivation,
                'Status': a.status,
                'Notes': a.notes || '',
                'Attachments': (a.attachments || []).map(f => f.url).join('\n'),
                'Date Applied': a.created_at ? new Date(a.created_at).toLocaleDateString('en-GB') : '',
            }));

            const ws = XLSX.utils.json_to_sheet(rows);

            // Column widths
            ws['!cols'] = [
                { wch: 4 },   // #
                { wch: 22 },  // Name
                { wch: 16 },  // WhatsApp
                { wch: 28 },  // Email
                { wch: 16 },  // Area
                { wch: 20 },  // Instagram
                { wch: 18 },  // Salary
                { wch: 10 },  // Commute
                { wch: 50 },  // Motivation
                { wch: 12 },  // Status
                { wch: 30 },  // Notes
                { wch: 50 },  // Attachments
                { wch: 14 },  // Date
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Applications');

            const date = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, `Sihtak_Applications_${date}.xlsx`);
            showToast('Excel exported: ' + allApps.length + ' applications', 'success');
        }

        // Toast
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast toast-' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Close status menu on outside click
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('statusMenu');
            if (!menu.contains(e.target)) menu.style.display = 'none';
        });

        // Password
        const ACCESS_CODE = '8474';

        function checkPass() {
            const val = document.getElementById('passInput').value;
            if (val === ACCESS_CODE) {
                sessionStorage.setItem('careers-admin', '1');
                unlockAdmin();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('passInput').value = '';
                document.getElementById('passInput').focus();
            }
        }

        function unlockAdmin() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminNav').style.display = '';
            document.getElementById('adminContainer').style.display = '';
            loadApplications();
        }

        // Init — check if already authenticated this session
        if (sessionStorage.getItem('careers-admin') === '1') {
            unlockAdmin();
        } else {
            document.getElementById('passInput').focus();
        }
    </script>
</body>
</html>
